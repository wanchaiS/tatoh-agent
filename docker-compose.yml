services:
  db:
    container_name: taatoh-db
    restart: always
    image: postgres:16
    env_file:
      - ./agent_api/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  api:
    container_name: taatoh-api
    restart: always
    image: registry.digitalocean.com/aas-solution/taatoh:api-master
    env_file:
      - ./agent_api/.env
    volumes:
      - static_files:/app/static
    depends_on:
      db:
        condition: service_healthy

  client:
    container_name: taatoh-client
    image: registry.digitalocean.com/aas-solution/taatoh:client-master
    volumes:
      - static_files:/app/static:ro  # read-only — nginx serves photos directly

  cloudflared:
    container_name: cloudflared_tunnel
    restart: always
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    command: tunnel run
    env_file:
      - .env

volumes:
  pgdata:
  static_files:
